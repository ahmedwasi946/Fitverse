spring.application.name=fitverse-api
server.port=8080

# JWT configuration
# IMPORTANT: this default secret is for local development only.
# Override with an environment variable (JWT_SECRET) before deploying anywhere real.
# Must be at least 256 bits (32 bytes) for the HS256 algorithm used by JwtService.
app.jwt.secret=${JWT_SECRET:fitverse-dev-only-secret-key-change-me-before-production-please-32bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Database (Phase 3)
# Point these at your own MySQL instance, or override via env vars.
# Quick local setup: docker run --name fitverse-mysql -e MYSQL_ROOT_PASSWORD=root -e MYSQL_DATABASE=fitverse_db -p 3306:3306 -d mysql:8
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fitverse_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Hibernate manages the schema directly from the @Entity classes below.
# A hand-written, equivalent reference schema (with the same tables, foreign
# keys and indexes) also ships in schema.sql if you'd rather manage the
# schema yourself — see the note at the top of that file for how to switch.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

